<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>صفحة | Portfolio</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <div class="scroll-progress" id="scroll-progress"></div>
  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="/" class="nav-logo"><div class="logo-icon" id="nav-logo-text">م.ح</div></a>
      <div class="nav-links" id="nav-links"></div>
      <div class="nav-right">
        <button class="lang-toggle" id="lang-toggle">EN</button>
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
      </div>
    </div>
  </nav>
  <div class="mobile-drawer-overlay" id="drawer-overlay"></div>
  <div class="mobile-drawer" id="mobile-drawer">
    <div class="mobile-drawer-header">
      <div class="nav-logo"><div class="logo-icon" id="drawer-logo">م.ح</div></div>
      <button class="mobile-drawer-close" id="drawer-close">✕</button>
    </div>
    <nav class="mobile-drawer-nav" id="mobile-drawer-nav"></nav>
    <div class="mobile-drawer-footer"><button class="lang-toggle" id="drawer-lang-toggle">EN</button></div>
  </div>

  <div id="page-content">
    <div class="loading" style="min-height:80vh;"><div class="spinner"></div></div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding:0;">
        <p id="footer-copy"></p>
        <div class="footer-social" id="footer-social"></div>
      </div>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(location.search);
      const slug = params.get('slug');
      const lang = getLang();
      const content = document.getElementById('page-content');
      if (!slug) {
        content.innerHTML = '<div class="empty-state" style="min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;"><h3>الصفحة غير موجودة</h3></div>';
        return;
      }
      try {
        const page = await api.getPage(slug);
        const title = lang === 'ar' ? page.titleAr : (page.titleEn || page.titleAr);
        const body  = lang === 'ar' ? page.contentAr : (page.contentEn || page.contentAr);
        document.title = `${title} | Portfolio`;
        content.innerHTML = `
          <section class="page-hero">
            <div class="container"><h1 class="section-title reveal" style="font-size:clamp(2.5rem,6vw,4rem)">${title}</h1></div>
          </section>
          <section class="section">
            <div class="container container--narrow">
              <div style="color:var(--text-2);line-height:1.9;font-size:1.05rem;white-space:pre-wrap;">${body || ''}</div>
            </div>
          </section>`;
        initReveal();
      } catch {
        content.innerHTML = '<div class="empty-state" style="min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;"><h3>تعذر تحميل الصفحة</h3></div>';
      }
    });
  </script>
</body>
</html>
