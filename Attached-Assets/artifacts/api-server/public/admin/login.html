<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول | CMS</title>
  <link rel="stylesheet" href="/css/admin.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrap { width: 100%; max-width: 420px; padding: 24px; }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
    }
    .login-logo {
      width: 56px; height: 56px;
      background: var(--gradient);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 900; color: #fff;
      margin: 0 auto 24px;
    }
    .login-title { text-align: center; font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; }
    .login-subtitle { text-align: center; color: var(--text-secondary); font-size: 0.88rem; margin-bottom: 32px; }
    .error-msg { background: rgba(255,77,106,.1); border: 1px solid rgba(255,77,106,.3); color: var(--danger); padding: 10px 14px; border-radius: var(--radius-md); font-size: 0.85rem; margin-bottom: 16px; display: none; }
    .bg-orb { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; }
    .bg-orb-1 { width: 400px; height: 400px; background: radial-gradient(circle,rgba(79,156,249,.15),transparent); top: -100px; right: -100px; }
    .bg-orb-2 { width: 300px; height: 300px; background: radial-gradient(circle,rgba(139,92,246,.1),transparent); bottom: -100px; left: -100px; }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo" id="login-logo">م.ح</div>
      <div class="login-title">لوحة التحكم</div>
      <div class="login-subtitle">سجل الدخول للوصول إلى لوحة التحكم</div>
      <div class="error-msg" id="error-msg"></div>
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">اسم المستخدم</label>
          <input type="text" class="form-input" id="username" placeholder="admin" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn--primary btn--full" id="submit-btn" style="margin-top:8px;">
          <span id="btn-label">تسجيل الدخول</span>
        </button>
      </form>
      <p style="margin-top:20px;text-align:center;font-size:0.78rem;color:var(--text-muted);">
        البيانات الافتراضية: admin / admin123
      </p>
    </div>
    <p style="text-align:center;margin-top:16px;font-size:0.8rem;color:var(--text-muted);">
      <a href="/" style="color:var(--text-secondary);">← العودة للموقع</a>
    </p>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    (async () => {
      const token = localStorage.getItem('cms_token');
      if (token) {
        try { await api.me(); location.href = '/admin/'; return; } catch {}
      }
    })();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      btn.disabled = true;
      document.getElementById('btn-label').textContent = 'جارٍ الدخول...';
      try {
        const { token } = await api.login(username, password);
        localStorage.setItem('cms_token', token);
        location.href = '/admin/';
      } catch (err) {
        errEl.textContent = err.message || 'بيانات الدخول غير صحيحة';
        errEl.style.display = 'block';
        btn.disabled = false;
        document.getElementById('btn-label').textContent = 'تسجيل الدخول';
      }
    });
  </script>
</body>
</html>
