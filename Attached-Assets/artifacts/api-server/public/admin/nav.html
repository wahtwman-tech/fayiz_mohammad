<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قائمة التنقل | CMS</title>
  <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><div class="sidebar-logo"><div class="logo-icon">م.ح</div><span>CMS</span></div></div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">القائمة الرئيسية</div>
        <a href="/admin/" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>لوحة التحكم</a>
        <a href="/admin/projects.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>إدارة المشاريع</a>
        <a href="/admin/admin-services.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>إدارة الخدمات</a>
        <a href="/admin/pages.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>إدارة الصفحات</a>
        <a href="/admin/nav.html" class="sidebar-link active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>قائمة التنقل</a>
        <div class="sidebar-section-label" style="margin-top:16px;">الإعدادات</div>
        <a href="/admin/settings.html" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>إعدادات الموقع</a>
        <a href="/" target="_blank" class="sidebar-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>عرض الموقع</a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user"><div class="sidebar-user-avatar" id="user-avatar">A</div><div><div class="sidebar-user-name" id="user-name">Admin</div><div class="sidebar-user-role">مدير الموقع</div></div></div>
        <button class="sidebar-logout" id="logout-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>تسجيل الخروج</button>
      </div>
    </aside>

    <main class="admin-main">
      <header class="topbar">
        <div><div class="topbar-title">قائمة التنقل</div><div class="topbar-subtitle">أدر روابط قائمة التنقل الرئيسية</div></div>
        <div class="topbar-actions">
          <button class="btn btn--primary" id="add-nav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            رابط جديد
          </button>
        </div>
      </header>
      <div class="page-content">
        <div class="panel">
          <div class="table-wrap">
            <table class="admin-table">
              <thead><tr><th>العنوان (عربي)</th><th>العنوان (إنجليزي)</th><th>الرابط</th><th>مفعّل</th><th>الترتيب</th><th>الإجراءات</th></tr></thead>
              <tbody id="nav-tbody">
                <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">جارٍ التحميل...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Nav Modal -->
  <div class="modal-overlay" id="nav-modal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="nav-modal-title">رابط جديد</div>
        <button class="modal-close" onclick="closeNavModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group"><label class="form-label">العنوان (عربي) *</label><input type="text" class="form-input" id="nav-labelAr" placeholder="الرئيسية" /></div>
          <div class="form-group"><label class="form-label">العنوان (إنجليزي)</label><input type="text" class="form-input" id="nav-labelEn" placeholder="Home" /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">الرابط *</label><input type="text" class="form-input" id="nav-url" placeholder="/about.html" /></div>
          <div class="form-group">
            <label class="form-label">الهدف</label>
            <select class="form-select" id="nav-target"><option value="_self">نفس النافذة</option><option value="_blank">نافذة جديدة</option></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">الترتيب</label><input type="number" class="form-input" id="nav-order" value="0" min="0" /></div>
          <div class="form-group" style="display:flex;align-items:flex-end;padding-bottom:8px;">
            <div class="toggle-wrap"><div class="toggle on" id="nav-active-toggle"></div><label class="toggle-label">مفعّل</label></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn--ghost" onclick="closeNavModal()">إلغاء</button>
        <button class="btn btn--primary" id="save-nav-btn">حفظ الرابط</button>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>
  <script src="/js/api.js"></script>
  <script src="/js/admin/auth.js"></script>
  <script src="/js/admin/nav.js"></script>
</body>
</html>
